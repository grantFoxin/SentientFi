name: Backend Tests

on:
  pull_request:
    paths:
      - 'backend/**'

      - '.github/workflows/backend-tests.yml'
  push:
    branches:
      - main
      - develop
    paths:
      - 'backend/**'

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-${{ matrix.node-version }}
          path: backend/coverage/
          if-no-files-found: ignore

  
